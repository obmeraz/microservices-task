server.port=8080
spring.application.name=resource-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5438/resource-db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

song.service.name=song-service

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:false}
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.client.registry-fetch-interval-seconds=5

aws.s3.bucket-name=resource-service-mp3
aws.s3.region=us-east-1
aws.s3.endpoint=${AWS_S3_ENDPOINT:http://localhost:4566}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:test}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:test}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

spring.cloud.stream.bindings.resourceUploaded-out-0.destination=resource.uploaded
spring.cloud.stream.bindings.resourceUploaded-out-0.producer.required-groups=resource-processor
spring.cloud.stream.rabbit.bindings.resourceUploaded-out-0.producer.exchangeType=topic
spring.cloud.stream.rabbit.bindings.resourceUploaded-out-0.producer.auto-bind-dlq=true
